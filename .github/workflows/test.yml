name: Stress Test Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  unit-integration:
    name: Unit + Integration (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Existing test suite
        run: npm test

      - name: Stress suite
        run: npm run test:stress

  fuzz:
    name: Seeded Fuzz
    runs-on: ubuntu-latest
    needs: unit-integration
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fuzz tests with fixed seed
        run: npm run test:stress:fuzz
        env:
          STROID_FUZZ_SEED: "20260403"

  benchmarks:
    name: Benchmarks + Regression Gate
    runs-on: ubuntu-latest
    needs: unit-integration
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark suite
        run: npm run bench:stress

      - name: Fail if benchmark regresses >20%
        run: npm run bench:stress:check

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: scripts/benchmark-results/
          if-no-files-found: error

  coverage:
    name: Coverage Summary
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: unit-integration
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        id: coverage
        run: npm run test:stress:coverage
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/stress/coverage-summary.json
          if-no-files-found: ignore

      - name: Comment coverage on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/stress/coverage-summary.json';
            const marker = '<!-- stroid-stress-coverage -->';

            let body = `${marker}\n## Stress Coverage\nCoverage report was not generated (tests may have failed before coverage output).`;
            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              const totals = summary.total;
              body = `${marker}
            ## Stress Coverage
            - Lines: **${totals.lines.pct}%** (${totals.lines.covered}/${totals.lines.total})
            - Statements: **${totals.statements.pct}%** (${totals.statements.covered}/${totals.statements.total})
            - Functions: **${totals.functions.pct}%** (${totals.functions.covered}/${totals.functions.total})
            - Branches: **${totals.branches.pct}%** (${totals.branches.covered}/${totals.branches.total})`;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
