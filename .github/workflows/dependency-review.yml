name: Dependency Review

on:
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review Dependency Changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
